sonar.projectKey=project-willamette
sonar.projectName=project-willamette
sonar.sourceEncoding=UTF-8

sonar.sources=src,scripts,.github/workflows
sonar.tests=tests
sonar.exclusions=target/**,sonar-reports/**,models/**,outputs/**,reference_outputs/**,docs/**
# Coverage exclusions — code paths whose correctness is verified by
# real-model integration tests (the 1.1 GiB BitNet GGUF is intentionally
# NOT in CI, so cargo test SKIPs those files at runtime via
# `if !Path::new(MODEL_PATH).exists()`). The bytes-vs-bytes comparison
# against pinned bitnet.cpp on the Stage 5-E reference prompts is the
# authoritative check; line-coverage % would only measure "did the
# unit-test runner happen to step through this line", which is the
# wrong question for forward-path code.
sonar.coverage.exclusions=scripts/**,.github/**,src/main.rs,src/chat/**,src/model/bitlinear_neon.rs,src/model/graph.rs,src/model/cached_forward.rs,src/model/multi_forward.rs,src/model/block.rs,src/model/forward.rs,src/tokenizer/mod.rs

sonar.rust.cargo.manifestPaths=Cargo.toml
sonar.rust.clippy.enable=false
sonar.rust.clippy.reportPaths=sonar-reports/clippy.json
sonar.rust.lcov.reportPaths=sonar-reports/lcov.info
