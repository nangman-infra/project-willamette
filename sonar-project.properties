sonar.projectKey=project-willamette
sonar.projectName=project-willamette
sonar.sourceEncoding=UTF-8

sonar.sources=src,scripts,.github/workflows
sonar.tests=tests
sonar.exclusions=target/**,sonar-reports/**,models/**,outputs/**,reference_outputs/**,docs/**
# Coverage exclusions — code paths that genuinely cannot run in CI:
#
# * `src/main.rs`               — clap-driven binary entry point;
#                                  every code path goes through one
#                                  of the cmd_* fns which require
#                                  args + real-model integration.
# * `src/chat/**`               — chat engine + ratatui TUI;
#                                  exercised by interactive use,
#                                  not unit tests.
# * `src/model/bitlinear_neon.rs` — aarch64-only NEON kernel; the
#                                    Linux x86 CI runner has no NEON,
#                                    so this whole file is compiled
#                                    out via cfg(target_arch="aarch64").
# * `scripts/**`, `.github/**` — shell + workflow files.
#
# Everything else — including the model load + forward path
# (graph.rs, cached_forward.rs, multi_forward.rs, block.rs,
# forward.rs) and the tokenizer module — is covered in CI by
# `tests/synthetic_model.rs` and `tests/tokenizer_synthetic.rs`,
# which build minimal in-memory GGUFs that exercise the production
# code paths without needing the 1.1 GiB model file.
sonar.coverage.exclusions=scripts/**,.github/**,src/main.rs,src/chat/**,src/model/bitlinear_neon.rs

sonar.rust.cargo.manifestPaths=Cargo.toml
sonar.rust.clippy.enable=false
sonar.rust.clippy.reportPaths=sonar-reports/clippy.json
sonar.rust.lcov.reportPaths=sonar-reports/lcov.info
