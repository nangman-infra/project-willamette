name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Note (2026-05-25): SonarSource/sonarqube-scan-action was bumped from
# @v6 (Node 20, force-runs on 24 with a deprecation warning) to @v7.2.1
# (native Node 24, drop-in compatible: keeps skipSignatureVerification
# defaulted to true — v8 flips it to false, which is a real breaking
# change). The FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 env is harmless once
# every action is already on Node 24 but kept as a belt-and-suspenders
# guard against future v1 composite actions that re-introduce Node 20
# under the hood.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        # Real-model integration tests SKIP themselves when the GGUF is
        # absent (see tests/*.rs `if !Path::new(MODEL_PATH).exists()`),
        # so the suite runs cleanly without the 1.1 GiB model file.
        run: cargo test --all-targets

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate clippy report
        run: |
          mkdir -p sonar-reports
          cargo clippy --all-targets --message-format=json -- -D warnings > sonar-reports/clippy.json

      - name: Generate coverage report
        # Coverage will look low: real-model integration tests are
        # SKIPped here because the 1.1 GiB GGUF is not in CI. The
        # lib + synthetic GGUF tests still run.
        run: cargo llvm-cov --all-targets --lcov --output-path sonar-reports/lcov.info

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
