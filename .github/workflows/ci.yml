name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Real-GGUF tests need a 1.1 GiB model that we cannot ship in the
  # repo. Without WILLAMETTE_MODEL_PATH (or the default
  # ./models/bitnet-b1.58-2B-4T-gguf/ggml-model-i2_s.gguf), those tests
  # SKIP themselves with a clear eprintln message — so the rest of the
  # suite (synthetic GGUF parsers, byte-unicode, BPE merge, RMSNorm,
  # RoPE math, sampler, kv_cache shape tests, ...) still runs in CI.
  #
  # Hosting a 1.1 GiB GGUF in GitHub Actions storage is impractical for
  # MVP; production CI should add an env-controlled lane that pulls the
  # model from object storage and runs the full real-model suite.

  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy (no warnings as errors yet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --release --all-targets -- -A clippy::needless_range_loop -A clippy::too_many_arguments -A clippy::manual_is_multiple_of -A clippy::doc_lazy_continuation -A clippy::missing_safety_doc -A clippy::bool_assert_comparison

  test-linux-x86:
    name: cargo test (linux/x86_64, model-less)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cargo test --release

  # Apple Silicon runner if available — these test the NEON path
  # against the scalar reference for the BitLinear matvec without
  # needing the real GGUF (synthetic fixtures + lib-level unit tests).
  test-macos-arm:
    name: cargo test (macos-aarch64, model-less)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cargo test --release
